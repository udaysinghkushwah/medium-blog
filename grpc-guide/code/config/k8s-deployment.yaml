apiVersion: apps/v1
kind: Deployment
metadata:
  name: hero-grpc-service
  labels:
    app: hero-grpc
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hero-grpc
  template:
    metadata:
      labels:
        app: hero-grpc
    spec:
      containers:
        - name: grpc-server
          image: myregistry/hero-grpc-service:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hero-grpc-service
  labels:
    app: hero-grpc
spec:
  type: ClusterIP
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
      appProtocol: grpc
  selector:
    app: hero-grpc
